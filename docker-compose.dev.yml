version: '3.8'

# 开发环境配置覆盖
services:
  # MongoDB开发配置
  mongodb:
    image: mongo:6.0
    container_name: rural-art-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
      - ./backend/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: rural-art-platform-dev

  # 后端开发配置
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/rural-art-platform-dev?authSource=admin
      JWT_SECRET: dev-jwt-secret-key
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: debug
      # 开发环境AI服务配置
      GZHU_AGENT_API_URL: https://api.gzhu.edu.cn/agent
      GZHU_AGENT_KEY: dev-gzhu-agent-key
      COZE_API_URL: https://api.coze.com/v1
      COZE_API_KEY: dev-coze-api-key
      COZE_IMAGE_ENHANCE_BOT_ID: dev-image-enhance-bot-id
      COZE_STYLE_TRANSFER_BOT_ID: dev-style-transfer-bot-id
      COZE_PATTERN_GENERATE_BOT_ID: dev-pattern-generate-bot-id
      COZE_SMART_REPAIR_BOT_ID: dev-smart-repair-bot-id
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/.env:/app/.env:ro
      - backend_dev_uploads:/app/uploads
      - backend_dev_logs:/app/logs
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
      - "9229:9229"  # Node.js调试端口
    command: npm run dev

  # 前端开发配置
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      - ./package.json:/app/package.json:ro
      - ./vite.config.js:/app/vite.config.js:ro
      - ./tailwind.config.js:/app/tailwind.config.js:ro
      - ./postcss.config.js:/app/postcss.config.js:ro
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"  # Vite开发服务器端口
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
      - VITE_APP_ENV=development
    command: npm run dev

  # 开发环境不需要nginx代理
  nginx:
    profiles:
      - production

volumes:
  mongodb_dev_data:
    driver: local
  backend_dev_uploads:
    driver: local
  backend_dev_logs:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local