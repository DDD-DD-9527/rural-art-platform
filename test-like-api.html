<!DOCTYPE html>
<html>
<head>
    <title>测试点赞API</title>
</head>
<body>
    <h1>点赞API测试</h1>
    <button onclick="testLikeAPI()">测试点赞API</button>
    <div id="result"></div>

    <script>
        async function testLikeAPI() {
            const resultDiv = document.getElementById('result');
            const postId = '68a30de158140f1e9093f681'; // 使用日志中的帖子ID
            const token = localStorage.getItem('auth_token');
            
            if (!token) {
                resultDiv.innerHTML = '<p style="color: red;">请先登录获取token</p>';
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:3000/api/posts/${postId}/like`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h3>响应结果:</h3>
                    <p><strong>状态码:</strong> ${response.status}</p>
                    <p><strong>响应内容:</strong></p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                console.log('API响应:', data);
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">请求失败: ${error.message}</p>`;
                console.error('请求失败:', error);
            }
        }
        
        // 显示当前token状态
        window.onload = function() {
            const token = localStorage.getItem('auth_token');
            if (token) {
                document.body.innerHTML += `<p>当前token: ${token.substring(0, 20)}...</p>`;
            } else {
                document.body.innerHTML += '<p style="color: red;">未找到token，请先登录</p>';
            }
        }
    </script>
</body>
</html>
